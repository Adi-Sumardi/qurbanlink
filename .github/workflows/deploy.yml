name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          # Forward Midtrans client key into the SSH session so `npm run build`
          # bakes it into the Next.js bundle (NEXT_PUBLIC_* are build-time)
          envs: MIDTRANS_CLIENT_KEY
          script: |
            cd /var/www/distribusi-kurban
            git pull origin main

            # ── Backend ──────────────────────────────────────────
            cd backend
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link
            sudo systemctl reload php8.2-fpm

            # ── Frontend ─────────────────────────────────────────
            cd ../frontend
            npm ci

            # Write NEXT_PUBLIC_* env to .env.production.local so Next.js bakes them at build.
            # API URL and IS_PRODUCTION are hardcoded — they're not sensitive and rarely change.
            # Client key (the only sensitive one of the three) comes from GitHub secret.
            cat > .env.production.local <<EOF
            NEXT_PUBLIC_API_URL=https://api.tawzii.id/api/v1
            NEXT_PUBLIC_MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
            NEXT_PUBLIC_MIDTRANS_IS_PRODUCTION=true
            EOF

            npm run build
            pm2 reload frontend-kurban --update-env || pm2 start npm --name frontend-kurban -- start

            echo "✅ Deploy selesai"
