name: Deploy Backend

on:
  push:
    branches: [backend]

jobs:
  deploy:
    name: Deploy Backend ke VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
          MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}
          MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: RESEND_KEY,MIDTRANS_SERVER_KEY,MIDTRANS_CLIENT_KEY,TURNSTILE_SECRET_KEY
          script: |
            cd /var/www/qurbanlink-backend
            git pull origin backend

            # Inject Midtrans config ke .env
            grep -q "^MIDTRANS_SERVER_KEY=" .env \
              && sed -i "s|^MIDTRANS_SERVER_KEY=.*|MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}|" .env \
              || echo "MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}" >> .env
            grep -q "^MIDTRANS_CLIENT_KEY=" .env \
              && sed -i "s|^MIDTRANS_CLIENT_KEY=.*|MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}|" .env \
              || echo "MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}" >> .env
            grep -q "^MIDTRANS_IS_PRODUCTION=" .env \
              && sed -i "s|^MIDTRANS_IS_PRODUCTION=.*|MIDTRANS_IS_PRODUCTION=true|" .env \
              || echo "MIDTRANS_IS_PRODUCTION=true" >> .env

            # Inject Cloudflare Turnstile secret
            grep -q "^TURNSTILE_SECRET_KEY=" .env \
              && sed -i "s|^TURNSTILE_SECRET_KEY=.*|TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}|" .env \
              || echo "TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}" >> .env
            grep -q "^TURNSTILE_REQUIRED=" .env \
              && sed -i "s|^TURNSTILE_REQUIRED=.*|TURNSTILE_REQUIRED=true|" .env \
              || echo "TURNSTILE_REQUIRED=true" >> .env

            # Inject Resend SMTP config ke .env
            sed -i "s|^MAIL_MAILER=.*|MAIL_MAILER=smtp|" .env
            sed -i "s|^MAIL_HOST=.*|MAIL_HOST=smtp.resend.com|" .env
            sed -i "s|^MAIL_PORT=.*|MAIL_PORT=465|" .env
            sed -i "s|^MAIL_SCHEME=.*|MAIL_SCHEME=smtps|" .env
            sed -i "s|^MAIL_USERNAME=.*|MAIL_USERNAME=resend|" .env
            grep -q "^MAIL_PASSWORD=" .env \
              && sed -i "s|^MAIL_PASSWORD=.*|MAIL_PASSWORD=${RESEND_KEY}|" .env \
              || echo "MAIL_PASSWORD=${RESEND_KEY}" >> .env
            sed -i "s|^MAIL_FROM_ADDRESS=.*|MAIL_FROM_ADDRESS=noreply@tawzii.id|" .env
            sed -i "s|^MAIL_FROM_NAME=.*|MAIL_FROM_NAME=\"Tawzii Digital\"|" .env
            sed -i "s|^APP_NAME=.*|APP_NAME=\"Tawzii Digital\"|" .env

            php8.4 /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction
            php8.4 artisan migrate --force
            php8.4 artisan config:cache
            php8.4 artisan route:cache
            php8.4 artisan view:cache
            sudo systemctl reload php8.4-fpm
            sudo supervisorctl restart kurban-worker:*
            echo "✅ Backend deployed"